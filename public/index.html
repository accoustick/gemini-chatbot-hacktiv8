<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gemini AI Chatbot</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <div class="chat-header">
      <div class="profile">
        <div class="profile-pic">👨‍🏫</div>
        <div class="profile-info">
          <h2>Guru Bot - Guru Les AI untuk kamu !</h2>
          <p>online</p>
        </div>
      </div>
    </div>
    <div id="chat-box" class="chat-box"></div>
    <div class="chat-footer">
      <form id="chat-form">
        <input type="text" id="user-input" placeholder="Ketik pesan" autocomplete="off" required />
        <button type="submit" id="send-btn">
          <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M1.101 21.757 23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"></path></svg>
        </button>
      </form>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
